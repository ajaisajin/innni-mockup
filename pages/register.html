<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | INNNI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="site-header"></div>
  <main>
    <section class="page-hero py-12">
      <div class="max-w-7xl mx-auto px-4">
        <h1 class="text-3xl font-bold">Membership Registration</h1>
        <p class="text-slate-200 mt-2">Complete the form below to join INNNI</p>
      </div>
    </section>
    <div class="max-w-5xl mx-auto px-4 py-12 grid lg:grid-cols-5 gap-8">
      <div class="hidden lg:block lg:col-span-2">
        <img src="../assets/img/networking.jpg" alt="Join INNNI community" class="rounded-xl shadow-lg w-full h-full min-h-[400px] object-cover sticky top-24">
      </div>
      <div class="lg:col-span-3">
      <div class="mb-8 flex items-center justify-between">
        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-full bg-teal-600 text-white flex items-center justify-center text-sm font-bold">1</span><span class="text-sm font-medium">Details</span></div>
        <div class="flex-1 h-0.5 bg-slate-200 mx-2"></div>
        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-sm font-bold">2</span><span class="text-sm text-slate-500">Payment</span></div>
        <div class="flex-1 h-0.5 bg-slate-200 mx-2"></div>
        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-sm font-bold">3</span><span class="text-sm text-slate-500">Confirm</span></div>
      </div>
      <form class="card space-y-4" onsubmit="event.preventDefault(); alert('Mock form — payment step would follow via Stripe.');">
        <h2 class="text-xl font-bold text-slate-800 mb-2">Personal Information</h2>
        <div class="grid sm:grid-cols-2 gap-4">
          <div class="form-group"><label>First Name *</label><input type="text" placeholder="Priya" required></div>
          <div class="form-group"><label>Last Name *</label><input type="text" placeholder="Sharma" required></div>
        </div>
        <div class="form-group"><label>Email Address *</label><input type="email" placeholder="you@example.com" required></div>
        <div class="form-group"><label>Phone</label><input type="tel" placeholder="+44 7XXX XXXXXX"></div>
        <div class="form-group"><label>NMC PIN (if registered)</label><input type="text" placeholder="XXAXXXXX"></div>
        <div class="form-group"><label>Trust / Employer</label><select><option>Select trust...</option><option>Belfast Health & Social Care Trust</option><option>South Eastern HSC Trust</option><option>Southern Health & Social Care Trust</option><option>Other</option></select></div>
        <div class="form-group"><label>Country of Initial Nursing Training</label><input type="text" placeholder="e.g. India, Philippines"></div>
        <h2 class="text-xl font-bold text-slate-800 pt-4">Membership Plan</h2>
        <div class="space-y-3">
          <label class="flex items-start gap-3 p-4 border-2 border-teal-500 rounded-lg bg-teal-50 cursor-pointer">
            <input type="radio" name="plan" checked class="mt-1 w-4 h-4">
            <div><span class="font-semibold">Annual — GBP 12/year</span><p class="text-sm text-slate-600">Best value. Renews annually.</p></div>
          </label>
          <label class="flex items-start gap-3 p-4 border border-slate-200 rounded-lg cursor-pointer hover:border-teal-300">
            <input type="radio" name="plan" class="mt-1 w-4 h-4">
            <div><span class="font-semibold">Monthly — GBP 1/month</span><p class="text-sm text-slate-600">Flexible monthly billing.</p></div>
          </label>
        </div>
        <label class="flex items-start gap-2 text-sm text-slate-600">
          <input type="checkbox" required class="mt-1 w-4 h-4 rounded">
          I agree to the <a href="terms.html" class="text-teal-600 underline">Terms & Conditions</a> and <a href="privacy.html" class="text-teal-600 underline">Privacy Policy</a>
        </label>
        <label class="flex items-start gap-2 text-sm text-slate-600">
          <input type="checkbox" required class="mt-1 w-4 h-4 rounded">
          I have read and accept the <a href="governance.html" class="text-teal-600 underline">Code of Conduct</a>
        </label>
        <button type="submit" class="w-full py-3 rounded-lg bg-teal-600 text-white font-semibold hover:bg-teal-500">Continue to Payment</button>
      </form>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/layout.js"></script>
  <script>initLayout({ page: 'membership', siteRoot: '../' });</script>
</body>
</html>
