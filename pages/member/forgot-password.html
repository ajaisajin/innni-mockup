<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | INNNI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="site-header"></div>
  <main class="flex-grow flex items-center justify-center py-6 sm:py-12 px-4">
    <div class="w-full max-w-md card">
      <h1 class="text-lg sm:text-xl font-bold text-slate-800 mb-2">Forgot Password</h1>
      <p class="text-sm text-slate-600 mb-6">Enter your email and we'll send a reset link.</p>
      <form onsubmit="event.preventDefault(); alert('Mock: reset email sent.');">
        <div class="form-group"><label>Email</label><input type="email" required></div>
        <button type="submit" class="btn-touch w-full py-3 rounded-lg bg-teal-600 text-white font-semibold hover:bg-teal-500">Send Reset Link</button>
      </form>
      <a href="login.html" class="block text-center text-sm text-teal-600 mt-4 hover:underline">&larr; Back to login</a>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../assets/js/layout.js"></script>
  <script>initLayout({ page: '', siteRoot: '../../', area: 'public' });</script>
</body>
</html>
