<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | INNNI Member Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">
  <div id="site-header"></div>
  <div class="flex flex-grow max-w-7xl mx-auto w-full">
    <div id="member-sidebar"></div>
    <main class="flex-grow p-4 md:p-8">
      <h1 class="text-2xl font-bold text-slate-800 mb-8">My Profile</h1>
      <div class="grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 card">
          <div class="flex items-center gap-4 mb-6 pb-6 border-b border-slate-100">
            <img src="../../assets/img/avatar-3.jpg" alt="Priya Sharma" class="w-20 h-20 rounded-full object-cover ring-4 ring-teal-100">
            <div>
              <h2 class="text-xl font-bold text-slate-800">Priya Sharma</h2>
              <p class="text-sm text-slate-500">priya.sharma@example.com</p>
              <span class="badge-member mt-1">Active Member</span>
            </div>
          </div>
          <h2 class="font-bold text-slate-800 mb-4">Personal Details</h2>
          <form class="space-y-4" onsubmit="event.preventDefault(); alert('Mock: profile saved.');">
            <div class="grid sm:grid-cols-2 gap-4">
              <div class="form-group"><label>First Name</label><input type="text" value="Priya"></div>
              <div class="form-group"><label>Last Name</label><input type="text" value="Sharma"></div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" value="priya.sharma@example.com"></div>
            <div class="form-group"><label>Phone</label><input type="tel" value="+44 7700 900123"></div>
            <div class="form-group"><label>Trust / Employer</label><select><option selected>Belfast Health & Social Care Trust</option></select></div>
            <div class="form-group"><label>Country of Training</label><input type="text" value="India"></div>
            <button type="submit" class="px-6 py-2.5 rounded-lg bg-teal-600 text-white font-medium hover:bg-teal-500">Save Changes</button>
          </form>
        </div>
        <div class="space-y-6">
          <div class="card">
            <h2 class="font-bold text-slate-800 mb-3">Membership Status</h2>
            <p class="text-green-600 font-semibold text-lg">Active</p>
            <p class="text-sm text-slate-600 mt-2">Plan: Annual (GBP 12/year)</p>
            <p class="text-sm text-slate-600">Member since: March 2025</p>
            <p class="text-sm text-slate-600">Renews: 15 January 2027</p>
            <button class="mt-4 w-full py-2 text-sm border border-teal-600 text-teal-600 rounded-lg hover:bg-teal-50">Manage subscription</button>
          </div>
          <div class="card">
            <h2 class="font-bold text-slate-800 mb-3">Password</h2>
            <button class="w-full py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-50">Change Password</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="site-footer"></div>
  <script src="../../assets/js/layout.js"></script>
  <script>initLayout({ page: 'profile', siteRoot: '../../', area: 'member' });</script>
</body>
</html>
