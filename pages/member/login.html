<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login | INNNI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="site-header"></div>
  <main class="flex-grow flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-4xl grid md:grid-cols-2 gap-0 bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="hidden md:block relative min-h-[480px]">
        <img src="../../assets/img/hero-nurses.jpg" alt="Healthcare professionals" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent flex items-end p-8">
          <p class="text-white text-lg font-medium">Your member portal for resources, events, and community.</p>
        </div>
      </div>
      <div class="p-8 md:p-10 flex flex-col justify-center">
      <div class="text-center mb-8 md:text-left">
        <div class="w-14 h-14 rounded-xl innni-gradient text-white font-bold text-lg flex items-center justify-center mb-4 mx-auto md:mx-0">IN</div>
        <h1 class="text-2xl font-bold text-slate-800">Member Login</h1>
        <p class="text-slate-600 mt-2">Access your INNNI member portal</p>
      </div>
      <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div class="form-group"><label>Email</label><input type="email" value="priya.sharma@example.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" value="password" required></div>
        <div class="flex justify-between text-sm">
          <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4 rounded"> Remember me</label>
          <a href="forgot-password.html" class="text-teal-600 hover:underline">Forgot password?</a>
        </div>
        <button type="submit" class="w-full py-3 rounded-lg bg-teal-600 text-white font-semibold hover:bg-teal-500">Sign In</button>
      </form>
      <p class="text-center text-sm text-slate-600 mt-6">Not a member? <a href="../register.html" class="text-teal-600 font-medium hover:underline">Register here</a></p>
      <p class="text-center text-sm mt-4"><a href="../../index.html" class="text-slate-500 hover:text-teal-600">&larr; Back to website</a></p>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../assets/js/layout.js"></script>
  <script>initLayout({ page: '', siteRoot: '../../', area: 'public' });</script>
</body>
</html>
