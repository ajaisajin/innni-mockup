<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Events | INNNI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">
  <div id="site-header"></div>
  <div class="flex flex-grow max-w-7xl mx-auto w-full">
    <div id="member-sidebar"></div>
    <main class="flex-grow p-4 md:p-8">
      <h1 class="text-2xl font-bold text-slate-800 mb-8">My Events</h1>
      <section class="mb-10">
        <h2 class="font-bold text-slate-700 mb-4">Registered</h2>
        <div class="card flex flex-col sm:flex-row gap-4 items-start">
          <div class="bg-teal-600 text-white rounded-lg p-3 text-center min-w-[70px]"><div class="text-xl font-bold">15</div><div class="text-xs">JUL</div></div>
          <div class="flex-grow"><h3 class="font-bold text-slate-800">CV & Interview Skills Workshop</h3><p class="text-sm text-slate-500">Belfast · 10:00 - 13:00</p><span class="inline-block mt-2 text-xs px-2 py-1 bg-green-100 text-green-700 rounded">Registered</span></div>
          <button class="text-sm text-red-600 hover:underline">Cancel registration</button>
        </div>
      </section>
      <section>
        <h2 class="font-bold text-slate-700 mb-4">Available to register</h2>
        <div class="space-y-4">
          <div class="card flex flex-col sm:flex-row gap-4 items-start">
            <div class="bg-teal-600 text-white rounded-lg p-3 text-center min-w-[70px]"><div class="text-xl font-bold">22</div><div class="text-xs">JUL</div></div>
            <div class="flex-grow"><h3 class="font-bold text-slate-800">Education Working Group Meeting</h3><p class="text-sm text-slate-500">Online · 18:00 - 19:30</p></div>
            <button class="px-4 py-2 rounded-lg bg-teal-600 text-white text-sm hover:bg-teal-500" onclick="alert('Mock: registered!')">Register</button>
          </div>
          <div class="card flex flex-col sm:flex-row gap-4 items-start">
            <div class="bg-slate-400 text-white rounded-lg p-3 text-center min-w-[70px]"><div class="text-xl font-bold">5</div><div class="text-xs">AUG</div></div>
            <div class="flex-grow"><h3 class="font-bold text-slate-800">Summer Social & Networking</h3><p class="text-sm text-slate-500">Belfast · 19:00 - 21:30</p></div>
            <button class="px-4 py-2 rounded-lg border border-teal-600 text-teal-600 text-sm hover:bg-teal-50" onclick="alert('Mock: registered!')">Register</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div id="site-footer"></div>
  <script src="../../assets/js/layout.js"></script>
  <script>initLayout({ page: 'member-events', siteRoot: '../../', area: 'member' });</script>
</body>
</html>
